<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003f87">
    <meta name="description" content="Free AI auto repair estimate guide from Bill Layne Insurance Agency in Elkin, NC. Snap photos of your vehicle damage, understand a body shop estimate, or compare two estimates side by side." />
    <title>AutoEstimate NC · Bill Layne Insurance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                navy:       '#003f87',
                'navy-dk':  '#012a5e',
                'navy-deep':'#001a3d',
                gold:       '#C8A84E',
                'gold-lt':  '#E0C878',
              }
            },
            fontFamily: {
              display: ['"Plus Jakarta Sans"', 'system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
              sans:    ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
            },
            keyframes: {
              fadeIn:  { '0%': { opacity: '0', transform: 'translateY(8px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
              floaty:  { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
            },
            animation: {
              fadeIn: 'fadeIn 0.5s ease-out both',
              floaty: 'floaty 6s ease-in-out infinite',
            },
            // Softer, layered "floaty" shadows borrowed from sendbilldocs —
            // overrides the default sm/md/lg/xl so all existing cards upgrade automatically.
            boxShadow: {
              sm: '0 2px 10px rgba(13,35,73,0.06)',
              DEFAULT: '0 12px 35px rgba(13,35,73,0.08)',
              md: '0 12px 35px rgba(13,35,73,0.08)',
              lg: '0 18px 50px rgba(10,31,66,0.12)',
              xl: '0 22px 70px rgba(10,31,66,0.16)',
              'glow-gold': '0 12px 28px rgba(200,168,78,0.40)',
              'glow-navy': '0 14px 34px rgba(0,63,135,0.28)',
            },
            backgroundImage: {
              'gold-grad': 'linear-gradient(180deg, #E0C878, #C8A84E)',
              'gold-grad-hover': 'linear-gradient(180deg, #EBD89A, #D4B65E)',
            },
            // Gentle radius bump (16px → 20px) for softer, friendlier cards.
            borderRadius: {
              '2xl': '1.25rem',
            },
          }
        }
      }
    </script>
    <style>
        html { -webkit-text-size-adjust: 100%; }
        body {
          font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
          /* Soft brand-tinted page background so white cards have depth on mobile */
          background-color: #eef2f8;
          background-image:
            radial-gradient(60rem 60rem at 100% -10%, rgba(0,63,135,0.10), transparent 60%),
            radial-gradient(50rem 50rem at -10% 110%, rgba(200,168,78,0.10), transparent 55%);
          background-attachment: fixed;
        }
        h1, h2, h3, .font-display { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        /* Keep inputs >=16px so iOS doesn't auto-zoom on focus (also set in components) */
        input, select, textarea { font-size: 16px; }
        /* Respect notch / home indicator on phones */
        .safe-b { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
